<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ingreso - La Casita de Tom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

  <div class="p-4 rounded border border-secondary col-11 col-sm-8 col-md-6 col-lg-4" style="background-color: var(--card-bg);">
    <div class="text-center mb-4">
      <h3 class="text-white fw-bold">Iniciar Sesión</h3>
      <p class="text-muted">Introduce tus credenciales registradas</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} p-2 small">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
      <div class="mb-3">
        <label class="form-label text-light">Usuario</label>
        <input type="text" class="form-control bg-dark text-white border-secondary" name="usuario" required>
      </div>
      <div class="mb-4">
        <label class="form-label text-light">Contraseña</label>
        <input type="password" class="form-control bg-dark text-white border-secondary" name="contrasena" required>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Ingresar</button>
    </form>
    
    <div class="text-center mt-3">
      <a href="{{ url_for('registro') }}" class="text-success small text-decoration-none">¿No tienes una cuenta? Regístrate gratis</a>
    </div>
  </div>

</body>
</html>
